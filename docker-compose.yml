version: '3.8'

services:
  backend-api:
    build:
      context: ./POCArgos
      dockerfile: Dockerfile
    container_name: pocargos-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - app-network
    volumes:
      - ./POCArgos:/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend-app:
    build:
      context: ./Angular
      dockerfile: Dockerfile
      args:
        ANGULAR_APP_API_URL: http://backend-api:8080/api
        ANGULAR_APP_PRODUCTION: "true"
        ANGULAR_APP_ENV: production
    container_name: omni-erp-frontend
    ports:
      - "80:80"
    depends_on:
      backend-api:
        condition: service_healthy
    environment:
      - ANGULAR_APP_API_URL=http://backend-api:8080/api
      - ANGULAR_APP_PRODUCTION=true
      - ANGULAR_APP_ENV=production
    networks:
      - app-network
    volumes:
      - ./Angular/nginx.conf:/etc/nginx/nginx.conf:ro

networks:
  app-network:
    driver: bridge
